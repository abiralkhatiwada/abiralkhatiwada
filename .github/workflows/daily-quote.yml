name: Update Daily Quote

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Fetch and Update Quote via Python
        run: |
          python3 -c "
          import urllib.request
          import json
          import re

          try:
              # Fetching from an alternate, highly available quotes API
              req = urllib.request.Request(
                  'https://open-quotes-api.vercel.app/api/quotes/random',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=10) as response:
                  data = json.loads(response.read().decode('utf-8'))
                  quote = data.get('quote', '').strip()
                  author = data.get('author', 'Unknown').strip()
          except Exception as e:
              # Bulletproof local fallbacks if the internet or API acts up
              import random
              fallbacks = [
                  ('Talk is cheap. Show me the code.', 'Linus Torvalds'),
                  ('Programs must be written for people to read, and only incidentally for machines to execute.', 'Harold Abelson'),
                  ('Simplicity is the soul of efficiency.', 'Austin Freeman')
              ]
              quote, author = random.choice(fallbacks)

          # Format the final Markdown blockquote safely as a pure python string literal
          new_quote_block = f'> \"{quote}\" – {author}'

          # Read the current README file with explicit UTF-8 encoding
          with open('README.md', 'r', encoding='utf-8') as file:
              content = file.read()

          # Use a simple split and replace to completely avoid regex encoding quirks
          start_marker = '<!--README_QUOTE_START-->'
          end_marker = '<!--README_QUOTE_END-->'
          
          if start_marker in content and end_marker in content:
              before = content.split(start_marker)[0]
              after = content.split(end_marker)[1]
              updated_content = f'{before}{start_marker}\n{new_quote_block}\n{end_marker}{after}'
              
              # Write back the updated file cleanly
              with open('README.md', 'w', encoding='utf-8') as file:
                  file.write(updated_content)
          else:
              print('Markers not found!')
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Force the commit message to be different to guarantee GitHub registers the change
          git commit -m "chore: refresh dynamic daily quote"
          git push
