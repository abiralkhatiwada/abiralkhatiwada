name: Update Daily Quote

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Fetch and Update Quote via Python
        run: |
          python3 -c "
          import urllib.request
          import json
          import re

          try:
              # Fetch from a highly reliable, free, no-auth tech quote API
              req = urllib.request.Request(
                  'https://programming-quotes-api.herokuapp.com/Quotes/random',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=10) as response:
                  data = json.loads(response.read().decode('utf-8'))
                  quote = data.get('en', '').strip()
                  author = data.get('author', 'Unknown').strip()
          except Exception as e:
              # Clean fallback quote if API times out
              quote = 'Simplicity is the soul of efficiency.'
              author = 'Austin Freeman'

          # Format the final Markdown blockquote safely as a clean string literal
          new_quote_block = f'> \"{quote}\" – {author}'

          # Read the current README file with explicit UTF-8 encoding
          with open('README.md', 'r', encoding='utf-8') as file:
              content = file.read()

          # Use regex to replace content between the markers flawlessly
          pattern = r'(<!--README_QUOTE_START-->\s*)(.*?)(\s*<!--README_QUOTE_END-->)'
          updated_content = re.sub(pattern, r'\1' + new_quote_block + r'\3', content, flags=re.DOTALL)

          # Write back the updated file cleanly
          with open('README.md', 'w', encoding='utf-8') as file:
              file.write(updated_content)
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: updated daily quote cleanly"
          git push
